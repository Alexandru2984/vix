services:
  vix-arena:
    build: .
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 18080
      PUBLIC_URL: http://localhost:18080
      ALLOWED_ORIGINS: http://localhost:${APP_PORT:-18080},http://127.0.0.1:${APP_PORT:-18080}
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    ports:
      - "${APP_PORT:-18080}:18080"
    restart: unless-stopped
